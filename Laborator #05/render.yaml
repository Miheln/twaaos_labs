services:
  - type: web
    name: homemade-to-do
    env: python
    buildCommand: 'cd "Laborator #05" && pip install -r requirements.txt'
    startCommand: 'cd "Laborator #05" && uvicorn main:app --host 0.0.0.0 --port $PORT'
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: EXPIRARE_TOKEN_MINUTE
        value: "30"
      - key: DATABASE_PATH
        value: /tmp/sarcini.db
